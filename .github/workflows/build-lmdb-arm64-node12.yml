name: Build lmdb-store ARM64 Node.js 12

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build in ARM64 container
        run: |
          mkdir -p output

          docker run --rm --platform=linux/arm64 \
            -v "$(pwd)/output:/output" \
            node:12-buster \
            bash -c "
              set -ex
              echo 'Architecture:' \$(uname -m)

              # Buster is EOL, point to archive
              sed -i 's|http://deb.debian.org|http://archive.debian.org|g' /etc/apt/sources.list
              sed -i '/security.debian.org/d' /etc/apt/sources.list
              apt-get update -q
              apt-get install -y -q g++ git

              # Clone lmdb-store@1.6.14 (repo renamed from DoctorEvidence/lmdb-store to kriszyp/lmdb-js)
              git clone --recurse-submodules --shallow-submodules \
                --depth 1 --branch v1.6.14 \
                https://github.com/kriszyp/lmdb-js.git /tmp/lmdb-store

              cd /tmp/lmdb-store

              # Install runtime deps without triggering install script
              npm install --ignore-scripts

              # Install prebuildify (node-gyp comes bundled with npm in Node 12)
              npm install --save-dev prebuildify

              # Build for current Node (12.x) - no cross-version headers issue
              ./node_modules/.bin/prebuildify --target $(node -v | tr -d 'v')

              echo '--- Build output ---'
              ls -lh prebuilds/linux-arm64/

              cp prebuilds/linux-arm64/node.abi72.node /output/
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lmdb-store-linux-arm64-node12
          path: output/node.abi72.node
          retention-days: 30
